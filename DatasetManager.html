<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Dataset Manager</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ─────────── Tokens (default = Emerald) ─────────── */
  :root {
    --bg: #07090b;
    --surface-1: #0d1013;
    --surface-2: #11161a;
    --surface-3: #161c21;
    --line: #1d252b;
    --line-2: #28333b;
    --fg: #e6edec;
    --fg-mute: #9aa6a3;
    --fg-dim: #5e6a68;
    --fg-soft: #404a48;

    --accent: #10b981;          /* emerald 500 */
    --accent-2: #34d399;        /* emerald 400 */
    --accent-deep: #064e3b;     /* emerald 900 */
    --accent-glow: rgba(16,185,129,.15);

    --warn: #d29a3a;
    --warn-bg: #2a1f0c;
    --bad:  #d6624a;
    --bad-bg: #2a130d;
    --info: #4f93d6;
    --info-bg: #0c1e2a;
    --good: var(--accent);
    --good-bg: rgba(16,185,129,.12);

    --r-sm: 4px;
    --r: 6px;
    --r-lg: 10px;
    --r-xl: 14px;

    --shadow-sm: 0 1px 0 rgba(255,255,255,.02) inset, 0 1px 2px rgba(0,0,0,.4);
    --shadow-lg: 0 24px 60px -20px rgba(0,0,0,.7), 0 1px 0 rgba(255,255,255,.03) inset;
  }
  html[data-palette="marine"] {
    --accent: #6aa9ff;          /* marine blue */
    --accent-2: #95c0ff;
    --accent-deep: #0a2547;
    --accent-glow: rgba(106,169,255,.15);
    --good: #6aa9ff;
    --good-bg: rgba(106,169,255,.12);
    --bg: #06080d;
    --surface-1: #0b0e14;
    --surface-2: #0f131c;
    --surface-3: #141a25;
    --line: #1c2230;
    --line-2: #2a3346;
    --fg: #e3e8f0;
    --fg-mute: #9aa3b2;
    --fg-dim: #5e6776;
  }

  /* ─────────── Reset ─────────── */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01","cv11";
    font-size: 13px;
    line-height: 1.45;
  }
  .mono { font-family: "Geist Mono", ui-monospace, monospace; font-feature-settings: "ss01"; }

  /* ─────────── App layout ─────────── */
  #app { display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
  .sidebar {
    background: var(--surface-1);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column; min-width: 0;
  }
  .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }

  /* ─────────── Sidebar ─────────── */
  .brand {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--line);
    height: 49px;
  }
  .brand-mark {
    width: 22px; height: 22px; border-radius: 5px;
    background:
      radial-gradient(circle at 30% 30%, var(--accent-2), var(--accent) 60%, var(--accent-deep) 110%);
    box-shadow: 0 0 0 1px var(--line-2), inset 0 0 0 1px rgba(255,255,255,.05);
    position: relative;
  }
  .brand-mark::after {
    content:""; position: absolute; inset: 5px;
    border-radius: 2px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.4), transparent 50%) ;
    mix-blend-mode: overlay;
  }
  .brand-name { font-weight: 600; letter-spacing: -0.01em; font-size: 14px; }
  .brand-sub  { color: var(--fg-dim); font-size: 11px; margin-top: 1px; letter-spacing: .02em; }

  .nav { padding: 10px 8px; display: flex; flex-direction: column; gap: 1px; flex: 1; overflow-y: auto; }
  .nav-section { padding: 14px 8px 4px; font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--fg-dim); }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px; border-radius: var(--r);
    color: var(--fg-mute); font-size: 13px;
    cursor: pointer; user-select: none;
    transition: background .12s, color .12s;
    position: relative;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--fg); }
  .nav-item.active { background: var(--surface-3); color: var(--fg); }
  .nav-item.active::before {
    content:""; position: absolute; left: -8px; top: 8px; bottom: 8px; width: 2px;
    background: var(--accent); border-radius: 2px;
  }
  .nav-item .ico { width: 16px; height: 16px; flex-shrink: 0; opacity: .85; }
  .nav-tail {
    margin-left: auto; font-size: 11px; color: var(--fg-dim);
    background: var(--surface-2); padding: 1px 6px; border-radius: 3px;
    border: 1px solid var(--line);
  }

  .sidebar-foot {
    border-top: 1px solid var(--line);
    padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    color: var(--fg-mute); font-size: 12px;
  }
  .gpu-meter {
    flex: 1;
    display: flex; flex-direction: column; gap: 3px;
  }
  .gpu-meter .row { display: flex; justify-content: space-between; font-size: 11px; }
  .gpu-meter .bar { height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .gpu-meter .fill { height: 100%; background: var(--accent); width: 62%; }

  /* ─────────── Topbar ─────────── */
  .topbar {
    height: 49px;
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid var(--line);
    background: var(--surface-1);
    flex-shrink: 0;
  }
  .crumbs { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--fg-mute); min-width: 0; }
  .crumbs a { color: var(--fg-mute); text-decoration: none; }
  .crumbs a:hover { color: var(--fg); }
  .crumbs .sep { color: var(--fg-soft); }
  .crumbs .here { color: var(--fg); }

  .topbar .spacer { flex: 1; }

  .progress-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 11px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px; color: var(--fg-mute);
    background: var(--surface-2);
    max-width: 380px; min-width: 0;
  }
  .progress-pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent-glow);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 var(--accent-glow); }
    70% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  }
  .progress-pill .label { color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progress-pill .bar { width: 80px; height: 3px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
  .progress-pill .fill { height: 100%; background: var(--accent); transition: width .4s; }
  .progress-pill .num { color: var(--fg-mute); }

  .icon-btn {
    width: 30px; height: 30px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: var(--r);
    color: var(--fg-mute); cursor: pointer;
    background: transparent; border: none;
    transition: background .12s, color .12s;
  }
  .icon-btn:hover { background: var(--surface-2); color: var(--fg); }
  .icon-btn.danger:hover { color: var(--bad); }

  /* ─────────── Buttons ─────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 6px 11px;
    font: 500 12.5px/1 "Geist", sans-serif;
    border-radius: var(--r);
    border: 1px solid var(--line-2);
    background: var(--surface-2);
    color: var(--fg);
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s, transform .04s;
    white-space: nowrap;
    height: 30px;
  }
  .btn:hover { background: var(--surface-3); border-color: var(--line-2); }
  .btn:active { transform: translateY(0.5px); }
  .btn .ico { width: 14px; height: 14px; }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #03130d;
    box-shadow: 0 1px 0 rgba(255,255,255,.2) inset, 0 1px 0 rgba(0,0,0,.4);
  }
  html[data-palette="marine"] .btn.primary { color: #02101f; }
  .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--fg-mute); }
  .btn.ghost:hover { background: var(--surface-2); color: var(--fg); }
  .btn.danger { color: var(--bad); }
  .btn.danger:hover { background: var(--bad-bg); border-color: var(--bad); }
  .btn.sm { height: 24px; padding: 4px 8px; font-size: 11.5px; }
  .btn[disabled] { opacity: .5; cursor: not-allowed; }

  /* ─────────── Inputs ─────────── */
  .input, .select {
    height: 30px;
    padding: 0 10px;
    background: var(--surface-2);
    border: 1px solid var(--line-2);
    border-radius: var(--r);
    color: var(--fg);
    font: 400 12.5px "Geist", sans-serif;
    outline: none;
    transition: border-color .12s, box-shadow .12s;
  }
  .input::placeholder { color: var(--fg-dim); }
  .input:focus, .select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .select {
    appearance: none;
    padding-right: 28px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6' fill='none'><path d='M1 1l4 4 4-4' stroke='%239aa6a3' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }
  .label { font-size: 11px; color: var(--fg-mute); display: block; margin-bottom: 6px; letter-spacing: .04em; }
  .search-wrap { position: relative; display: inline-flex; align-items: center; }
  .search-wrap .ico { position: absolute; left: 9px; color: var(--fg-dim); pointer-events: none; width: 13px; height: 13px; }
  .search-wrap .input { padding-left: 28px; }

  .checkbox {
    appearance: none;
    width: 14px; height: 14px;
    border: 1px solid var(--line-2);
    background: var(--surface-2);
    border-radius: 3px;
    display: inline-grid; place-content: center;
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .checkbox:hover { border-color: var(--fg-dim); }
  .checkbox:checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .checkbox:checked::after {
    content: "";
    width: 8px; height: 8px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 10 8' fill='none'><path d='M1 4l3 3 5-6' stroke='%23030d09' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/></svg>") center/contain no-repeat;
  }

  /* ─────────── Surfaces ─────────── */
  .panel {
    background: var(--surface-1);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
  }
  .panel.flush { border-radius: 0; border-left: 0; border-right: 0; }
  .panel-h {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 12px;
  }
  .panel-h h3 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
  .panel-b { padding: 18px; }

  /* ─────────── Badges ─────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px;
    border-radius: 999px;
    font-size: 10.5px; font-weight: 500;
    border: 1px solid var(--line-2);
    background: var(--surface-2);
    color: var(--fg-mute);
    line-height: 1.4;
  }
  .badge.dot::before {
    content:""; width: 5px; height: 5px; border-radius: 50%;
    background: var(--fg-dim);
  }
  .badge.good { color: var(--good); border-color: rgba(16,185,129,.3); background: var(--good-bg); }
  .badge.good.dot::before { background: var(--good); }
  .badge.warn { color: var(--warn); border-color: rgba(210,154,58,.3); background: var(--warn-bg); }
  .badge.warn.dot::before { background: var(--warn); }
  .badge.bad  { color: var(--bad);  border-color: rgba(214,98,74,.3);  background: var(--bad-bg); }
  .badge.bad.dot::before { background: var(--bad); }
  .badge.info { color: var(--info); border-color: rgba(79,147,214,.3); background: var(--info-bg); }
  .badge.info.dot::before { background: var(--info); }
  .badge.solid {
    background: var(--surface-3);
    border-color: var(--line-2);
    color: var(--fg);
  }

  /* ─────────── KBD ─────────── */
  kbd {
    font-family: "Geist Mono", monospace;
    font-size: 10.5px;
    padding: 1px 5px;
    border: 1px solid var(--line-2);
    border-bottom-width: 2px;
    border-radius: 3px;
    background: var(--surface-2);
    color: var(--fg-mute);
  }

  /* ─────────── Page header ─────────── */
  .page { padding: 24px 28px; overflow-y: auto; flex: 1; min-height: 0; }
  .page-h { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 22px; }
  .page-h h1 { margin: 0 0 4px; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .page-h p { margin: 0; color: var(--fg-mute); font-size: 13px; }
  .page-h .actions { display: flex; gap: 8px; align-items: center; }

  /* ─────────── Datasets ─────────── */
  .ds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .ds-card {
    background: var(--surface-1);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    overflow: hidden;
    transition: border-color .15s, transform .15s;
    cursor: pointer;
    display: flex; flex-direction: column;
    position: relative;
  }
  .ds-card:hover { border-color: var(--line-2); }
  .ds-card .preview {
    height: 110px;
    background: var(--surface-2);
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1px;
    position: relative;
  }
  .ds-card .preview .tile {
    background: linear-gradient(135deg, var(--surface-3), var(--surface-2));
    position: relative; overflow: hidden;
  }
  .ds-card .preview .tile::after {
    content:""; position: absolute; inset: 0;
    background:
      radial-gradient(circle at 30% 40%, rgba(255,255,255,.04), transparent 50%),
      linear-gradient(135deg, transparent 60%, rgba(0,0,0,.3));
  }
  .ds-card .preview-fade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 30%, var(--surface-1));
    pointer-events: none;
  }
  .ds-card .body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 12px; }
  .ds-card .title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .ds-card h3 { margin: 0; font-size: 14.5px; font-weight: 600; letter-spacing: -.01em; }
  .ds-card .desc { color: var(--fg-mute); font-size: 12px; line-height: 1.5; min-height: 18px; }
  .ds-card .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ds-card .stat {
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 8px 10px;
  }
  .ds-card .stat .k { color: var(--fg-dim); font-size: 10.5px; letter-spacing: .04em; text-transform: uppercase; }
  .ds-card .stat .v { color: var(--fg); font-size: 16px; font-weight: 600; font-feature-settings: "tnum"; margin-top: 2px; }
  .ds-card .stat.accent .v { color: var(--accent); }
  .ds-card .meta { display: flex; align-items: center; gap: 8px; color: var(--fg-dim); font-size: 11.5px; }
  .ds-card .row-actions {
    position: absolute; top: 10px; right: 10px;
    display: flex; gap: 4px; opacity: 0; transition: opacity .15s;
  }
  .ds-card:hover .row-actions { opacity: 1; }
  .ds-card .row-actions .icon-btn {
    width: 26px; height: 26px;
    background: rgba(7,9,11,.7);
    border: 1px solid var(--line-2);
    backdrop-filter: blur(8px);
  }

  /* Captioning progress in ds card preview */
  .ds-card .preview-overlay {
    position: absolute; left: 14px; bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    z-index: 2;
  }

  /* ─────────── Gallery ─────────── */
  .gallery-toolbar {
    padding: 14px 28px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
    background: var(--surface-1);
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .img-card {
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    overflow: hidden;
    background: var(--surface-1);
    cursor: pointer;
    transition: border-color .12s, transform .12s;
    position: relative;
  }
  .img-card:hover { border-color: var(--line-2); }
  .img-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), 0 0 24px -8px var(--accent-glow); }
  .img-card .thumb {
    aspect-ratio: 1/1; position: relative;
    background: linear-gradient(135deg, var(--surface-2), var(--surface-3));
    overflow: hidden;
  }
  .img-card .thumb::before, .img-card .thumb::after {
    content:""; position: absolute;
  }
  .img-card .thumb::before {
    inset: 0;
    background: var(--ph, linear-gradient(135deg, #1a2a25, #0d1a17));
  }
  .img-card .thumb .stripes {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.025) 0 6px, transparent 6px 14px);
  }
  .img-card .check {
    position: absolute; top: 8px; left: 8px; z-index: 3;
    width: 18px; height: 18px;
    background: rgba(7,9,11,.55);
    border: 1.5px solid rgba(255,255,255,.5);
    border-radius: 4px;
    display: grid; place-content: center;
    transition: all .12s;
    backdrop-filter: blur(4px);
  }
  .img-card:hover .check { border-color: #fff; }
  .img-card .check svg { opacity: 0; transition: opacity .12s; }
  .img-card.selected .check {
    background: var(--accent); border-color: var(--accent);
  }
  .img-card.selected .check svg { opacity: 1; }
  .img-card.selected .check svg path { stroke: #03130d; }
  .img-card .flags {
    position: absolute; top: 8px; right: 8px; z-index: 3;
    display: flex; gap: 4px;
  }
  .img-card .flag {
    width: 18px; height: 18px;
    border-radius: 4px;
    background: rgba(7,9,11,.7);
    backdrop-filter: blur(4px);
    display: grid; place-content: center;
    border: 1px solid var(--line-2);
  }
  .img-card .flag.warn  { color: var(--warn); }
  .img-card .flag.bad   { color: var(--bad); }
  .img-card .flag.info  { color: var(--info); }
  .img-card .score {
    position: absolute; bottom: 8px; right: 8px; z-index: 3;
    padding: 2px 7px;
    border-radius: 4px;
    font: 600 11px "Geist Mono", monospace;
    background: rgba(7,9,11,.75);
    backdrop-filter: blur(4px);
    border: 1px solid var(--line-2);
  }
  .img-card .score.good { color: var(--good); border-color: rgba(16,185,129,.4); }
  .img-card .score.warn { color: var(--warn); border-color: rgba(210,154,58,.4); }
  .img-card .score.bad  { color: var(--bad);  border-color: rgba(214,98,74,.4); }
  .img-card .meta {
    padding: 8px 10px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .img-card .fname { font-size: 11.5px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .img-card .dim { font-size: 10.5px; color: var(--fg-dim); font-family: "Geist Mono", monospace; }
  .img-card .cap { font-size: 11px; color: var(--fg-mute); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-top: 4px; border-top: 1px dashed var(--line); margin-top: 4px; }

  /* Selection bar */
  .sel-bar {
    position: sticky; bottom: 16px; margin: 16px auto 0;
    width: fit-content;
    background: var(--surface-2);
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 6px 8px 6px 14px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow-lg);
    z-index: 10;
  }
  .sel-bar .count { font-weight: 600; font-size: 12px; }

  /* Quality / Stats */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr 1fr; } }

  .stat-card {
    background: var(--surface-1);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 16px 18px;
  }
  .stat-card .k { color: var(--fg-mute); font-size: 11.5px; letter-spacing: .02em; }
  .stat-card .v { font-size: 26px; font-weight: 600; letter-spacing: -.02em; margin-top: 8px; font-feature-settings: "tnum"; }
  .stat-card .v small { color: var(--fg-dim); font-size: 13px; font-weight: 400; margin-left: 4px; }
  .stat-card .delta { font-size: 11px; color: var(--good); margin-top: 4px; }

  /* Histograms */
  .hist {
    display: grid; grid-template-columns: repeat(var(--cols, 10), 1fr);
    gap: 3px;
    align-items: end;
    height: 90px;
    margin-top: 14px;
  }
  .hist .b {
    background: linear-gradient(180deg, var(--accent), color-mix(in oklab, var(--accent) 50%, transparent));
    border-radius: 3px 3px 0 0;
    min-height: 4px;
    cursor: pointer;
    transition: filter .12s;
    position: relative;
  }
  .hist .b:hover { filter: brightness(1.4); }
  .hist .b.muted { background: var(--surface-3); }
  .hist-axis {
    display: grid; grid-template-columns: repeat(var(--cols, 10), 1fr);
    gap: 3px; margin-top: 6px;
    font: 400 10.5px "Geist Mono", monospace;
    color: var(--fg-dim);
  }
  .hist-axis span { text-align: center; }

  /* Captioning page */
  .form-row { display: grid; grid-template-columns: 200px 1fr; gap: 16px; align-items: flex-start; padding: 16px 0; border-bottom: 1px solid var(--line); }
  .form-row:last-child { border-bottom: 0; }
  .form-row .lbl-col h4 { margin: 0 0 4px; font-size: 13px; font-weight: 500; }
  .form-row .lbl-col p { margin: 0; font-size: 11.5px; color: var(--fg-mute); line-height: 1.5; }

  /* Model picker */
  .model-list { display: flex; flex-direction: column; gap: 6px; }
  .model-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--surface-1);
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .model-row:hover { border-color: var(--line-2); background: var(--surface-2); }
  .model-row.sel { border-color: var(--accent); background: var(--accent-glow); }
  .model-row .ind {
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--line-2);
    flex-shrink: 0;
    display: grid; place-content: center;
  }
  .model-row.sel .ind { border-color: var(--accent); }
  .model-row.sel .ind::after { content:""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .model-row .name { font-weight: 500; font-size: 13px; }
  .model-row .desc { color: var(--fg-mute); font-size: 11.5px; margin-top: 2px; }
  .model-row .vram { margin-left: auto; font: 500 11px "Geist Mono", monospace; color: var(--fg-mute); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
  .tab {
    padding: 9px 14px; font-size: 12.5px; color: var(--fg-mute);
    border-bottom: 2px solid transparent;
    cursor: pointer; user-select: none;
    transition: color .12s, border-color .12s;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--fg); border-bottom-color: var(--accent); }

  /* Toast / inline note */
  .toast {
    position: fixed; right: 22px; bottom: 22px;
    background: var(--surface-2);
    border: 1px solid var(--line-2);
    padding: 10px 14px;
    border-radius: var(--r-lg);
    font-size: 12.5px;
    box-shadow: var(--shadow-lg);
    display: flex; align-items: center; gap: 10px;
    transform: translateY(20px); opacity: 0;
    transition: transform .25s, opacity .25s;
    z-index: 100;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast .ico { color: var(--good); }

  /* Dialog */
  .dialog-bg {
    position: fixed; inset: 0; background: rgba(3,5,7,.6); backdrop-filter: blur(4px);
    display: grid; place-items: center; z-index: 50;
  }
  .dialog {
    background: var(--surface-1);
    border: 1px solid var(--line-2);
    border-radius: var(--r-xl);
    padding: 22px 24px;
    width: min(440px, 90vw);
    box-shadow: var(--shadow-lg);
  }
  .dialog h3 { margin: 0 0 6px; font-size: 16px; font-weight: 600; }
  .dialog p { color: var(--fg-mute); font-size: 12.5px; margin: 0 0 18px; }
  .dialog .row { display: flex; gap: 8px; justify-content: flex-end; }

  /* Misc */
  .empty {
    padding: 60px 20px; text-align: center; color: var(--fg-mute); font-size: 13px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .divider { height: 1px; background: var(--line); margin: 18px 0; }
  .row-flex { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .grow { flex: 1; }
  .legend-bar { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Quality flag legend bars */
  .flag-card {
    display: grid; grid-template-columns: 22px 1fr auto; align-items: center; gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: var(--r);
    background: var(--surface-1);
    cursor: pointer;
    transition: border-color .12s, background .12s;
  }
  .flag-card:hover { border-color: var(--line-2); background: var(--surface-2); }
  .flag-card .ic { width: 22px; height: 22px; border-radius: 5px; display: grid; place-content: center; }
  .flag-card .ic.bad { background: var(--bad-bg); color: var(--bad); }
  .flag-card .ic.warn { background: var(--warn-bg); color: var(--warn); }
  .flag-card .ic.info { background: var(--info-bg); color: var(--info); }
  .flag-card .name { font-size: 12.5px; }
  .flag-card .desc { font-size: 11px; color: var(--fg-mute); margin-top: 1px; }
  .flag-card .num { font: 600 14px "Geist Mono", monospace; color: var(--fg); }

  /* Hidden but takes space utilities */
  .hide { display: none !important; }

  /* page transitions */
  main.page > section { animation: fadein .25s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

  /* Score guide */
  .guide-row { display: grid; grid-template-columns: 130px 1fr; gap: 16px; padding: 10px 0; border-bottom: 1px dashed var(--line); }
  .guide-row:last-child { border-bottom: 0; }
  .guide-row .k { font-size: 12px; color: var(--fg); font-weight: 500; }
  .guide-row .v { font-size: 12px; color: var(--fg-mute); line-height: 1.55; }
</style>
</head>

/* ─────────── Helpers ─────────── */
const $ = (s, el=document) => el.querySelector(s);
const $$ = (s, el=document) => [...el.querySelectorAll(s)];

function tile(hue) {
  const h = TILE_HUES[hue % TILE_HUES.length];
  return `linear-gradient(${135 + hue*7}deg, ${h[0]}, ${h[1]} 60%, ${h[2]})`;
}

function scoreClass(s) {
  if (s == null) return "";
  if (s >= 6) return "good";
  if (s >= 4) return "warn";
  return "bad";
}

function showToast(msg) {
  $("#toast-msg").textContent = msg;
  $("#toast").classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => $("#toast").classList.remove("show"), 1800);
}

/* ─────────── Render Quality histograms + duplicates ─────────── */
function renderHist(id, vals, withWeight=true) {
  const el = $(id);
  if (!el) return;
  el.innerHTML = "";
  const max = Math.max(...vals);
  vals.forEach((v,i) => {
    const b = document.createElement("div");
    b.className = "b" + (v === 0 ? " muted" : "");
    b.style.height = `${Math.max(4, (v/max)*100)}%`;
    if (withWeight) {
      const opacity = 0.45 + 0.55 * (i / (vals.length-1));
      b.style.opacity = opacity;
    }
    b.title = `${v} images`;
    b.addEventListener("click", () => showToast(`Filtered bucket · ${v} images`));
    el.appendChild(b);
  });
}

const routes = {
  datasets:   { tpl: "tpl-datasets",   nav: "datasets",   crumb: ["Datasets"] },
  booru:      { tpl: "tpl-booru",      nav: "booru",      crumb: ["Booru Browser"] },
  gallery:    { tpl: "tpl-gallery",    nav: "gallery",    crumb: ["Datasets","portrait_v3","Gallery"] },
  captioning: { tpl: "tpl-captioning", nav: "captioning", crumb: ["Datasets","portrait_v3","Captioning"] },
  quality:    { tpl: "tpl-quality",    nav: "quality",    crumb: ["Datasets","portrait_v3","Score images"] },
  stats:      { tpl: "tpl-stats",      nav: "stats",      crumb: ["Datasets","portrait_v3","Stats"] },
  export:     { tpl: "tpl-export",     nav: "export",     crumb: ["Datasets","portrait_v3","Export"] },
};

function goto(name) {
  const r = routes[name]; if (!r) return;
  const tpl = $("#"+r.tpl);
  const page = $("#page");
  page.innerHTML = "";
  page.appendChild(tpl.content.cloneNode(true));

  $$("#nav .nav-item").forEach(el => el.classList.toggle("active", el.dataset.page === r.nav));

  const crumbs = r.crumb.map((c,i,arr) => i === arr.length-1
    ? `<span class="here">${c}</span>`
    : `<a href="#">${c}</a>`).join(`<span class="sep">/</span>`);
  $("#crumbs").innerHTML = crumbs;

  // page hooks
  if (name === "datasets") renderDatasets();
  if (name === "gallery")  { renderGallery(); }
  if (name === "quality")  renderQualityExtras();
  if (name === "stats")    renderStats();
  if (name === "export")   renderExport();

  // gallery selection bar wiring
  const clearBtn = $("#sel-clear");
  if (clearBtn) clearBtn.addEventListener("click", () => { selected.clear(); renderGallery(); updateSelBar(); });
  const allBtn = $("#select-all-btn");
  if (allBtn) allBtn.addEventListener("click", () => {
    if (selected.size === galleryImages.length) selected.clear();
    else galleryImages.forEach((_,i) => selected.add(i));
    renderGallery(); updateSelBar();
  });
}

$$("#nav .nav-item").forEach(el => {
  el.addEventListener("click", () => goto(el.dataset.page));
});

window.applyExternalTweaks = (next) => {

          label="Accent"
          value={t.palette}
          onChange={v => setTweak("palette", v)}
          options={[
            { value: "emerald", label: "Emerald" },
            { value: "marine", label: "Marine" },
          ]}
        />
      </TweakSection>
      <TweakSection title="Layout">
        <TweakToggle label="Show progress in topbar" value={t.showProgress} onChange={v => setTweak("showProgress", v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById("tweaks-root")).render(<TweaksApp />);
</script>

</body>
</html>
